name: Summarization Eval

on:
  push:
    branches: [main]
    paths:
      - 'run_eval_compare.py'
      - 'run_eval.py'
      - 'golden_set.json'
      - 'requirements.txt'
      - '.github/workflows/eval.yml'
  pull_request:
    branches: [main]
    paths:
      - 'run_eval_compare.py'
      - 'run_eval.py'
      - 'golden_set.json'
      - 'requirements.txt'
      - '.github/workflows/eval.yml'

jobs:
  run-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regression check
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python run_eval_compare.py